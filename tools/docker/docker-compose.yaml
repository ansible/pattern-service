x-environment: &common-env
  PATTERN_SERVICE_USE_POSTGRES: true
  PATTERN_SERVICE_DB_HOST: ps_postgres
  PATTERN_SERVICE_DB_PORT: 5432
  PATTERN_SERVICE_DB_NAME: pattern_db
  PATTERN_SERVICE_DB_USER: pattern
  PATTERN_SERVICE_DB_PASSWORD: pattern123
services:
  ps_postgres:
    image: ${PS_POSTGRES_IMAGE:-docker.io/postgres}:${PS_POSTGRES_VERSION:-latest}
    environment:
      POSTGRES_USER: pattern
      POSTGRES_PASSWORD: pattern123
      POSTGRES_DB: pattern_db
    ports:
      - '${PS_PG_PORT:-5432}:5432'
    volumes:
      - 'postgres_data:/var/lib/pgsql/data'
      # - '../../tools/docker/postgres/initdb:/docker-entrypoint-initdb.d:z'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pattern", "-d", "pattern_db"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - dev

  pattern-service-worker:
    image: ${PS_CONTAINER_IMAGE:-localhost/ansible-pattern-service-worker}
    environment: *common-env
    build:
      context: ../../
      dockerfile: tools/docker/Dockerfile
      target: worker
    command:
      - /bin/bash
      - -c
      - aap-pattern-service-manage worker
    depends_on:
      ps_postgres:
        condition: service_healthy
    restart: always
    networks:
      - dev

  pattern-service-api:
    image: ${PS_CONTAINER_IMAGE:-localhost/ansible-pattern-service-api}
    environment: *common-env
    build:
      context: ../../
      dockerfile: tools/docker/Dockerfile
      target: api
    command:
      - /bin/bash
      - -c
      - >-
        aap-pattern-service-manage makemigrations
        && aap-pattern-service-manage migrate
        && aap-pattern-service-manage runserver 0.0.0.0:5000
    ports:
      - "${PS_API_PORT:-8000}:5000"
    depends_on:
      ps_postgres:
        condition: service_healthy
      pattern-service-worker:
        condition: service_started
    healthcheck:
      test: [ 'CMD', 'curl', '-q', 'http://localhost:8000/ping/' ]
      interval: 30s
      timeout: 5s
      retries: 10
    networks:
      - dev
      - default

volumes:
  postgres_data: {}

networks:
  dev:
    name: dev